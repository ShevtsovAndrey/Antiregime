<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AntiRegime P2P Messenger</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="P2P Chat">
    <meta name="format-detection" content="telephone=no">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root { 
            --accent: #68afaf; 
            --bg-main: #212121; 
            --bg-light: #424242; 
            --text: #eeeeee; 
            --danger: #ff5555; 
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-main); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
        }

        /* ШАПКА */
        #auth-server { 
            padding: 15px; 
            background: #1a1a1a; 
            border-bottom: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 10px;
        }

        /* ПРОФИЛЬ (СЛЕВА) */
        .profile-form-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-light);
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid #444;
            flex: 0 1 auto;
        }

        #my-avatar-preview { 
            width: 40px; 
            height: 40px; 
            background: #333; 
            border-radius: 50%; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px solid var(--accent); 
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.3s;
        }

        #my-avatar-preview:hover { border-color: #fff; }
        #my-avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

        /* ИНФО (СПРАВА) */
        #connection-info {
            text-align: right;
            font-size: 9px;
            font-family: 'Segoe UI', monospace;
            color: var(--accent);
            opacity: 0.8;
            flex-shrink: 0;
            line-height: 1.3;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* ПОИСК */
        .controls-row { display: flex; gap: 10px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .input-group label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        /* ВКЛАДКИ */
        #chat-tabs { display: flex; gap: 5px; padding: 10px 15px 0 15px; background: #1a1a1a; overflow-x: auto; border-bottom: 1px solid #333; min-height: 45px; scrollbar-width: none; }
        .tab { position: relative; padding: 10px 35px 10px 15px; background: var(--bg-light); border-radius: 8px 8px 0 0; cursor: pointer; font-size: 13px; color: #bbb; border: 1px solid #555; border-bottom: none; transition: 0.2s; white-space: nowrap; }
        .tab.active { background: var(--bg-main); color: var(--accent); border-bottom: 3px solid var(--accent); font-weight: bold; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; position: absolute; right: 22px; top: 16px; background: #666; }
        .status-dot.online { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
        .close-tab { position: absolute; right: 8px; color: var(--danger); cursor: pointer; font-weight: bold; padding: 0 5px; }

        /* ОКНО ЧАТА */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; font-size: 15px; position: relative; word-wrap: break-word; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg b { display: flex; align-items: center; margin-bottom: 5px; color: var(--accent); font-size: 13px; }
        .avatar-mini { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; margin-right: 8px; border: 1px solid var(--accent); }
        .my-msg { align-self: flex-end; background: #2d4f4f; border: 1px solid var(--accent); }
        .peer-msg { align-self: flex-start; background: var(--bg-light); border: 1px solid #555; }
        .system-msg { align-self: center; color: #aaa; font-size: 11px; text-align: center; width: 100%; font-style: italic; margin: 5px 0; }

        /* ИНПУТЫ */
        input[type="text"] { padding: 10px; border-radius: 8px; border: 1px solid #555; background: var(--bg-light); color: white; outline: none; transition: 0.3s; font-size: 14px; }
        input[type="text"]:focus { border-color: var(--accent); }

        #input-area { padding: 15px; display: flex; gap: 10px; background: #1a1a1a; border-top: 1px solid #333; align-items: center; }
        #message-input { flex: 1; }

        /* КНОПКИ */
        .main-btn { padding: 10px 15px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; color: #1a1a1a; }
        .save-profile-btn { height: 34px; padding: 0 12px; margin-top: 14px; font-size: 11px; }
        .icon-btn { background: var(--bg-light); border: 1px solid #555; border-radius: 8px; cursor: pointer; padding: 10px; color: var(--accent); height: 42px; width: 42px; display: flex; align-items: center; justify-content: center; }
        .icon-btn.recording { background: #ff4b2b; color: white; animation: pulse 1s infinite; }
        
        /* ГРАФИКА */
        .chat-img { max-width: 100%; max-height: 250px; border-radius: 8px; border: 1px solid var(--accent); }
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; cursor: pointer; }
        #lightbox.open { display: flex; }
        .pending-msg { background: #555 !important; opacity: 0.7; font-style: italic; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    
    <div id="auth-server">
        <div class="top-bar">
            <div class="profile-form-group">
                <div id="my-avatar-preview" onclick="document.getElementById('avatar-upload').click()" title="Сменить фото">
                    👤
                </div>
                <input type="file" id="avatar-upload" accept="image/*" style="display: none;" onchange="uploadAvatar(this)">
                
                <div class="input-group">
                    <label>Ваш ID:</label>
                    <input type="text" id="my-id-input" placeholder="Ник..." onkeypress="if(event.key === 'Enter') changeMyId()">
                </div>
                <button class="main-btn save-profile-btn" onclick="changeMyId()">ОК</button>
            </div>

            <div id="connection-info">
                <div id="info-device">SYS: ...</div>
                <div id="info-net">NET: ...</div>
                <div id="info-ip">IP: ...</div>
            </div>
        </div>

        <div class="controls-row search-row">
            <div class="input-group">
                <label>Поиск по ID:</label>
                <input type="text" id="peer-id-input" placeholder="Введите ID для связи">
            </div>
            <button class="main-btn" onclick="connectToPeer()">Чат</button>
        </div>
    </div>

    <div id="chat-tabs"></div>
    <div id="chat-window"></div>
    <div id="typing-indicator" style="height: 15px; padding: 0 20px; font-size: 11px; color: var(--accent); opacity: 0;"></div>
    
    <div id="input-area">
        <input type="file" id="image-upload" accept="image/*" style="display: none;" onchange="uploadChatImage(this)">
        <button class="icon-btn" onclick="document.getElementById('image-upload').click()">📎</button>
        <button id="voice-btn" class="icon-btn" onclick="toggleRecording()">🎤</button>
        <input type="text" id="message-input" placeholder="Введите сообщение..." oninput="sendTypingStatus()">
        <button class="main-btn" onclick="sendMessage()">➤</button>
    </div>

    <div id="lightbox" onclick="this.classList.remove('open')">
        <img id="lightbox-img" style="max-width:90%; max-height:90%;">
    </div>

    <script src="script.js"></script>
</body>
</html>
