<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AntiRegime P2P Messenger</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="P2P Chat">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root { 
            --accent: #68afaf; 
            --bg-main: #212121; 
            --bg-light: #424242; 
            --text: #eeeeee; 
            --danger: #ff5555; 
        }

        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background: var(--bg-main); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            box-sizing: border-box;
        }

        /* ШАПКА */
        #auth-server { 
            padding: 10px 15px; 
            background: #1a1a1a; 
            border-bottom: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .profile-form-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-light);
            padding: 5px 10px;
            border-radius: 12px;
            border: 1px solid #444;
            flex: 1;
        }

        #my-avatar-preview { 
            width: 36px; 
            height: 36px; 
            background: #333; 
            border-radius: 50%; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px solid var(--accent); 
            cursor: pointer;
            flex-shrink: 0;
        }

        #my-avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

        #connection-info {
            text-align: right;
            font-size: 9px;
            font-family: monospace;
            color: var(--accent);
            opacity: 0.8;
            line-height: 1.2;
        }

        .controls-row { display: flex; gap: 8px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 3px; flex: 1; }
        .input-group label { font-size: 9px; color: #888; text-transform: uppercase; margin-left: 2px; }

        /* ВКЛАДКИ */
        #chat-tabs { 
            display: flex; 
            gap: 5px; 
            padding: 10px 15px 0; 
            background: #1a1a1a; 
            overflow-x: auto; 
            border-bottom: 1px solid #333; 
            min-height: 45px; 
            scrollbar-width: none; 
        }
        #chat-tabs::-webkit-scrollbar { display: none; }

        .tab { 
            position: relative; 
            padding: 8px 45px 8px 12px; 
            background: var(--bg-light); 
            border-radius: 8px 8px 0 0; 
            cursor: pointer; 
            font-size: 13px; 
            color: #bbb; 
            border: 1px solid #555; 
            border-bottom: none; 
            white-space: nowrap; 
            display: flex;
            align-items: center;
            min-width: 80px;
        }

        .tab.active { 
            background: var(--bg-main); 
            color: var(--accent); 
            border-bottom: 2px solid var(--accent); 
            font-weight: bold; 
        }

        /* Индикатор непрочитанных */
        .unread-badge {
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
            font-weight: bold;
            min-width: 12px;
            text-align: center;
            box-shadow: 0 0 5px rgba(255, 85, 85, 0.4);
        }

        .status-dot { 
            width: 7px; 
            height: 7px; 
            border-radius: 50%; 
            background: #666; 
            margin-left: 6px;
        }
        .status-dot.online { 
            background: var(--accent); 
            box-shadow: 0 0 5px var(--accent); 
        }

        .reconnect-tab {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            cursor: pointer;
            padding: 4px;
            opacity: 0.7;
            transition: 0.2s;
        }
        .reconnect-tab:hover { opacity: 1; transform: translateY(-50%) rotate(90deg); }

        .close-tab { 
            position: absolute; 
            right: 6px; 
            top: 50%;
            transform: translateY(-50%);
            color: var(--danger); 
            cursor: pointer; 
            font-size: 16px;
            padding: 4px;
        }

        /* ОКНО ЧАТА */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 14px; word-wrap: break-word; position: relative; }
        .msg b { display: flex; align-items: center; margin-bottom: 4px; color: var(--accent); font-size: 12px; }
        
        .avatar-mini { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; margin-right: 6px; border: 1px solid var(--accent); }
        .my-msg { align-self: flex-end; background: #2d4f4f; border: 1px solid var(--accent); border-bottom-right-radius: 2px; }
        .peer-msg { align-self: flex-start; background: var(--bg-light); border: 1px solid #555; border-bottom-left-radius: 2px; }
        .system-msg { align-self: center; color: #888; font-size: 11px; font-style: italic; margin: 4px 0; }

        /* ИНПУТЫ И КНОПКИ */
        input[type="text"] { padding: 10px; border-radius: 10px; border: 1px solid #444; background: var(--bg-light); color: white; outline: none; font-size: 14px; }
        
        #input-area { padding: 10px 15px env(safe-area-inset-bottom); display: flex; gap: 8px; background: #1a1a1a; border-top: 1px solid #333; align-items: center; }
        #message-input { flex: 1; }

        .main-btn { padding: 10px 16px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #1a1a1a; }
        .icon-btn { background: var(--bg-light); border: 1px solid #444; border-radius: 10px; cursor: pointer; padding: 8px; color: var(--accent); display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; }
        .icon-btn.recording { background: var(--danger); color: white; animation: pulse 1s infinite; }

        .chat-img { max-width: 100%; border-radius: 8px; cursor: pointer; margin-top: 5px; }
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        #lightbox.open { display: flex; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    
    <div id="auth-server">
        <div class="top-bar">
            <div class="profile-form-group">
                <div id="my-avatar-preview" onclick="document.getElementById('avatar-upload').click()">
                    👤
                </div>
                <input type="file" id="avatar-upload" accept="image/*" style="display: none;" onchange="uploadAvatar(this)">
                
                <div class="input-group">
                    <label>Мой Nickname:</label>
                    <input type="text" id="my-id-input" placeholder="Ник...">
                </div>
                <button class="main-btn" style="padding: 8px 12px; font-size: 12px;" onclick="changeMyId()">OK</button>
            </div>

            <div id="connection-info">
                <div id="info-device">SYS: ...</div>
                <div id="info-net">NET: ...</div>
                <div id="info-ip">IP: ...</div>
            </div>
        </div>

        <div class="controls-row">
            <div class="input-group">
                <label>Подключиться к ID:</label>
                <input type="text" id="peer-id-input" placeholder="Введите ID собеседника">
            </div>
            <button class="main-btn" onclick="connectToPeer()">Чат</button>
        </div>
    </div>

    <div id="chat-tabs"></div>
    <div id="chat-window"></div>
    <div id="typing-indicator" style="height: 14px; padding: 0 15px; font-size: 10px; color: var(--accent); opacity: 0; transition: 0.3s;">печатает...</div>
    
    <div id="input-area">
        <input type="file" id="image-upload" accept="image/*" style="display: none;" onchange="uploadChatImage(this)">
        <button class="icon-btn" onclick="document.getElementById('image-upload').click()">📎</button>
        <button id="voice-btn" class="icon-btn" onclick="toggleRecording()">🎤</button>
        <input type="text" id="message-input" placeholder="Сообщение..." oninput="sendTypingStatus()">
        <button class="main-btn" onclick="sendMessage()">➤</button>
    </div>

    <div id="lightbox" onclick="this.classList.remove('open')">
        <img id="lightbox-img" style="max-width:95%; max-height:95%; object-fit: contain;">
    </div>

    <script src="script.js"></script>
</body>
</html>
